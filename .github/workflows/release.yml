name: Release PrepaC

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate build metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="$(date -u +'%Y%m%d.%H%M')"
          BUILD_DISPLAY="$(date -u +'%Y.%m.%d-%H%M')"
          ZIP_NAME="PrepaC_v${TAG_NAME}_build_${BUILD_NUMBER/./_}.zip"

          {
            echo "tag_name=$TAG_NAME"
            echo "build_number=$BUILD_NUMBER"
            echo "build_display=$BUILD_DISPLAY"
            echo "zip_name=$ZIP_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Update app/version.py for this release
        shell: bash
        run: |
          cat > app/version.py <<EOF
          APP_NAME = "PrepaC"
          APP_VERSION = "${{ steps.meta.outputs.tag_name }}"
          BUILD_NUMBER = "${{ steps.meta.outputs.build_number }}"
          FULL_VERSION = f"{APP_VERSION}+{BUILD_NUMBER}"
          DISPLAY_VERSION = "PrepaC v${{ steps.meta.outputs.tag_name }} (Build ${{ steps.meta.outputs.build_display }})"
          BUILD_DISPLAY = "${{ steps.meta.outputs.build_display }}"
          EOF

      - name: Create release zip
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          root = Path('.')
          zip_name = Path("${{ steps.meta.outputs.zip_name }}")

          exclude_dir_names = {
              '.git', '.github', '__pycache__', '.pytest_cache', '.mypy_cache', '.ruff_cache',
              '.venv', 'venv', 'env', 'config'
          }
          exclude_suffixes = {'.pyc', '.pyo', '.db', '.sqlite', '.sqlite3'}
          exclude_file_names = {'.DS_Store'}

          def should_skip(path: Path) -> bool:
              parts = set(path.parts)
              if parts & exclude_dir_names:
                  return True
              if path.name in exclude_file_names:
                  return True
              if path.suffix.lower() in exclude_suffixes:
                  return True
              return False

          with zipfile.ZipFile(zip_name, 'w', compression=zipfile.ZIP_DEFLATED) as zf:
              for path in root.rglob('*'):
                  if path.is_dir() or should_skip(path):
                      continue
                  zf.write(path, path.as_posix())
          print(f"Created {zip_name}")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PrepaC v${{ steps.meta.outputs.tag_name }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.zip_name }}
