changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - github-actions[bot]

  categories:
    - title: New Features
      labels:
        - enhancement
        - feature

    - title: Fixes
      labels:
        - bug
        - fix

    - title: Documentation
      labels:
        - documentation
        - docs

    - title: Maintenance
      labels:
        - chore
        - refactor
        - dependencies

    - title: Other Changes
      labels:
        - "*"
