services:
  prepac:
    build: .
    container_name: prepac
    ports:
      - "1234:1234"
    volumes:
      - /mnt/user/Systems/appdata/prepac:/config
      - /mnt/user/TV Shows:/media/tv
      - /mnt/user/Movies:/media/movies
      - /mnt/user/Youtube Downloads:/media/youtube
      - /mnt/user/TBP/Jobs:/media/dest
      - /mnt:/host_mnt
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


# Optional secret sources (choose either env vars or bind-mounted files under /run/secrets)
