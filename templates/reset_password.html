{% extends "base.html" %}
{% block content %}
<section class="card" style="max-width: 520px; margin: 2rem auto;">
  <h2>Reset Password</h2>
  <form method="post" action="{{ url_for('reset_password_page') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-grid">
      <label><span>Username</span><input type="text" name="username" value="{{ username_value }}" required></label>
      <label><span>Recovery Secret</span><input type="password" name="recovery_secret" required></label>
      <label><span>New Password</span><input type="password" name="new_password" required></label>
      <label><span>Confirm Password</span><input type="password" name="confirm_password" required></label>
    </div>
    <div class="row" style="margin-top:1rem;">
      <button type="submit">Reset Password</button>
      <a href="{{ url_for('login_page') }}">Back to login</a>
    </div>
  </form>
</section>
{% endblock %}
