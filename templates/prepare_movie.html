{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Prepare Movie</h2>
  <p>Select one or more movies. PrepaC still creates one destination folder and one job per movie.</p>
  <div class="row">
    <input id="q" type="text" placeholder="Type part of a movie folder name">
    <button onclick="searchMovies()">Search</button>
  </div>
  <p id="searchStatus" class="muted">Idle.</p>

  <div class="selection-summary">
    <div><strong>Selected movies:</strong> <span id="selectedMoviesLabel">None</span></div>
  </div>

  <div id="movies" class="poster-grid"></div>

  <section class="card inset-card">
    <h3>Queued movies</h3>
    <div id="queueBox"><p class="muted">Nothing selected yet.</p></div>
  </section>

  <label><span>Bracket Override (optional, applied to all selected jobs)</span><input id="bracketOverride" type="text" placeholder="[WEBDL-1080p][AAC 5.1][h264]"></label>
  <button id="previewBtn" onclick="previewBatch()" disabled>Build Batch Preview</button>
</section>

<section class="card">
  <h2>Batch Preview</h2>
  <pre id="previewBox">No preview yet.</pre>
  <button id="startBtn" onclick="startBatchJobs()" disabled>Start Batch Movie Prepare Jobs</button>
</section>

<script>
let selectedMovies = new Map(); // movieName -> {poster_url}
let previewData = [];

function updateSummary() {
  const names = Array.from(selectedMovies.keys());
  document.getElementById('selectedMoviesLabel').textContent = names.length ? names.join(', ') : 'None';
  document.getElementById('previewBtn').disabled = names.length === 0;
  document.getElementById('queueBox').innerHTML = names.length
    ? '<ul>' + names.map(n => `<li>${n} <button type="button" class="mini-remove movie-remove" data-movie="${encodeURIComponent(n)}">Remove</button></li>`).join('') + '</ul>'
    : '<p class="muted">Nothing selected yet.</p>';
}


function removeMovieQueueItem(movieName) {
  selectedMovies.delete(movieName);
  previewData = [];
  document.getElementById('startBtn').disabled = true;
  document.getElementById('previewBox').textContent = 'No preview yet.';
  markMovieStates();
  updateSummary();
}

function markMovieStates() {
  document.querySelectorAll('#movies .linkbtn').forEach(btn => {
    btn.classList.remove('selected-item');
    const movieName = btn.dataset.movieName;
    if (selectedMovies.has(movieName)) btn.classList.add('selected-item');
  });
}

async function searchMovies() {
  const q = document.getElementById('q').value;
  const status = document.getElementById('searchStatus');
  const list = document.getElementById('movies');

  list.innerHTML = '';
  previewData = [];
  document.getElementById('startBtn').disabled = true;
  document.getElementById('previewBox').textContent = 'No preview yet.';
  status.textContent = 'Searching...';

  const r = await fetch(`/api/prepare/movie/search?q=${encodeURIComponent(q)}`);
  const d = await r.json();
  const results = d.results || [];

  if (!results.length) {
    status.textContent = 'No results found.';
    return;
  }

  status.textContent = `${results.length} result(s) found. Click one or more movies to select them.`;

  results.forEach(item => {
    const card = document.createElement('div');
    card.className = 'poster-card';
    card.innerHTML = `
      ${item.poster_url ? `<img src="${item.poster_url}" alt="">` : `<div class="poster-placeholder">No image</div>`}
      <button class="linkbtn" data-movie-name="${item.name}">${item.name}</button>
    `;
    const btn = card.querySelector('button');
    btn.onclick = () => {
      const movieName = item.name;
      if (selectedMovies.has(movieName)) {
        selectedMovies.delete(movieName);
      } else {
        selectedMovies.set(movieName, { poster_url: item.poster_url || '' });
      }
      previewData = [];
      document.getElementById('startBtn').disabled = true;
      document.getElementById('previewBox').textContent = 'No preview yet.';
      markMovieStates();
      updateSummary();
      status.textContent = 'Selection updated. You can build a batch preview now.';
    };
    list.appendChild(card);
  });

  markMovieStates();
  updateSummary();
}

async function previewBatch() {
  const bracket_override = document.getElementById('bracketOverride').value;
  const names = Array.from(selectedMovies.keys());
  if (!names.length) return;

  document.getElementById('previewBox').textContent = 'Building batch preview...';
  previewData = [];
  for (const movie_name of names) {
    const r = await fetch('/api/prepare/movie/preview', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ movie_name, bracket_override })
    });
    const item = await r.json();
    previewData.push(item);
  }

  document.getElementById('previewBox').textContent = JSON.stringify(previewData, null, 2);
  document.getElementById('startBtn').disabled = previewData.length === 0;
}

async function startBatchJobs() {
  for (const item of previewData) {
    await fetch('/api/prepare/movie/start', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(item)
    });
  }
  window.location.href = '/jobs';
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.movie-remove');
  if (!btn) return;
  removeMovieQueueItem(decodeURIComponent(btn.dataset.movie));
});

updateSummary();
</script>
{% endblock %}
