{% extends 'base.html' %}{% block content %}<section class='card'><h2>Setup Step {{step}}</h2>{% if step==1 %}<form method='post'><input name='username'><input name='password'><input name='secret'><button>Continue</button></form>{% elif step==2 %}<form method='post'><input name='tv_root'><input name='movie_root'><input name='dest_root'><input name='recycle_bin_root'><button>Continue</button><button name='skip' value='1'>Skip</button></form>{% elif step==3 %}<form method='post'><a href='/plex/signin'>Sign in Plex</a><button name='skip' value='1'>Skip</button></form>{% else %}<form method='post'><button>Finish</button></form>{% endif %}</section>{% endblock %}
